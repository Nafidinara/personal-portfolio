<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" role="img" aria-label="Animated diagram of the Creditopia peer-to-peer lending loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2388ff"/>
      <stop offset="1" stop-color="#0044a7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0044a7" flood-opacity="0.14"/>
    </filter>
    <style>
      .node { filter: url(#soft); }
      .label { font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 700; fill: #09090b; }
      .sub { font-family: ui-monospace, monospace; fill: #71717b; }
      .cap { font-family: 'Hanken Grotesk', system-ui, sans-serif; fill: #52525c; }
      .wire { stroke: #bcd6f5; stroke-width: 2.5; fill: none; stroke-dasharray: 6 7; animation: dash 1.4s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -26; } }
      .tokenA { offset-path: path('M 150 150 C 260 150, 300 150, 360 118'); animation: run 3.2s ease-in-out infinite; }
      .tokenB { offset-path: path('M 570 150 C 460 150, 420 150, 360 182'); animation: run 3.2s ease-in-out infinite; animation-delay: 1.6s; }
      @keyframes run { 0% { offset-distance: 0%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 3.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @media (prefers-reduced-motion: reduce) { .wire,.tokenA,.tokenB,.pulse { animation: none; } .tokenA,.tokenB { opacity: 1; } }
    </style>
  </defs>

  <rect x="0" y="0" width="720" height="300" rx="20" fill="url(#bg)"/>

  <!-- wires -->
  <path class="wire" d="M 150 150 C 260 150, 300 150, 360 118"/>
  <path class="wire" d="M 570 150 C 460 150, 420 150, 360 182"/>

  <!-- SME node -->
  <g class="node">
    <rect x="40" y="108" width="120" height="84" rx="18" fill="#ffffff" stroke="#dae9f8"/>
    <circle cx="100" cy="138" r="15" fill="#e2f0ff"/>
    <text x="100" y="143" text-anchor="middle" class="label" font-size="15">🏪</text>
    <text x="100" y="172" text-anchor="middle" class="label" font-size="15">SME</text>
    <text x="100" y="186" text-anchor="middle" class="sub" font-size="9">needs capital</text>
  </g>

  <!-- Contract node (center) -->
  <g class="pulse">
    <rect x="292" y="96" width="136" height="108" rx="20" fill="url(#chip)"/>
    <text x="360" y="132" text-anchor="middle" fill="#ffffff" class="label" font-size="14" style="fill:#fff">Smart</text>
    <text x="360" y="150" text-anchor="middle" fill="#ffffff" class="label" font-size="14" style="fill:#fff">Contract</text>
    <text x="360" y="176" text-anchor="middle" class="sub" font-size="9" style="fill:#cfe0ff">on ICP · on-chain</text>
  </g>

  <!-- Lender node -->
  <g class="node">
    <rect x="560" y="108" width="120" height="84" rx="18" fill="#ffffff" stroke="#dae9f8"/>
    <circle cx="620" cy="138" r="15" fill="#f9fecd"/>
    <text x="620" y="143" text-anchor="middle" class="label" font-size="15">💰</text>
    <text x="620" y="172" text-anchor="middle" class="label" font-size="15">Lender</text>
    <text x="620" y="186" text-anchor="middle" class="sub" font-size="9">global pool</text>
  </g>

  <!-- moving tokens -->
  <g class="tokenA"><circle r="7" fill="#2388ff"/></g>
  <g class="tokenB"><circle r="7" fill="#eab308"/></g>

  <text x="360" y="44" text-anchor="middle" class="label" font-size="16">Peer-to-peer lending, settled on-chain</text>
  <text x="360" y="258" text-anchor="middle" class="cap" font-size="12">Request flows in, funding flows back — the contract is the middleman no one has to trust.</text>
</svg>
